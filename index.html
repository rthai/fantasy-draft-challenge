<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ballghazi 2026 Draft Challenge</title>
<style>
  :root{
    --pitch: #0f3d2e;
    --pitch-dark: #0a2b20;
    --chalk: #f4f1e6;
    --chalk-dim: #d9d4c2;
    --gold: #e0b04a;
    --gold-bright: #f0c868;
    --card: #133f30;
    --line: rgba(244,241,230,0.12);
    --good: #6fbf8c;
    --display: 'Fraunces', 'Georgia', serif;
    --body: 'Inter', -apple-system, sans-serif;
    --mono: 'JetBrains Mono', 'Courier New', monospace;
  }

  *{box-sizing:border-box;}

  body{
    margin:0;
    background: var(--pitch-dark);
    background-image:
      repeating-linear-gradient(0deg, rgba(255,255,255,0.025) 0px, rgba(255,255,255,0.025) 1px, transparent 1px, transparent 64px),
      radial-gradient(ellipse at top, var(--pitch) 0%, var(--pitch-dark) 70%);
    color: var(--chalk);
    font-family: var(--body);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  @font-face {
    font-family: 'Fraunces';
    src: local('Georgia');
  }

  .wrap{
    max-width: 1100px;
    margin: 0 auto;
    padding: 56px 24px 100px;
  }

  /* ---------- HEADER ---------- */
  header{
    text-align:center;
    margin-bottom: 56px;
    position:relative;
  }
  .kicker{
    font-family: var(--mono);
    text-transform: uppercase;
    letter-spacing: 0.22em;
    font-size: 12px;
    color: var(--gold-bright);
    margin: 0 0 18px;
  }
  h1{
    font-family: var(--display);
    font-weight: 600;
    font-size: clamp(40px, 7vw, 72px);
    line-height: 1.02;
    margin: 0 0 16px;
    letter-spacing: -0.01em;
  }
  h1 span{
    font-style: italic;
    color: var(--gold-bright);
  }
  .sub{
    color: var(--chalk-dim);
    font-size: 16px;
    max-width: 540px;
    margin: 0 auto;
  }
  .status-pill{
    display:inline-flex;
    align-items:center;
    gap:8px;
    margin-top:22px;
    padding: 7px 16px;
    border: 1px solid var(--line);
    border-radius: 99px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--chalk-dim);
    background: rgba(244,241,230,0.04);
  }
  .status-dot{
    width:7px;height:7px;border-radius:50%;
    background: var(--gold-bright);
    box-shadow: 0 0 0 3px rgba(224,176,74,0.18);
    animation: pulse 2.2s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{ opacity:1; }
    50%{ opacity:0.4; }
  }

  /* ---------- SECTION LABELS ---------- */
  .section-head{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    margin: 0 0 22px;
    border-bottom: 1px solid var(--line);
    padding-bottom: 14px;
  }
  .section-head h2{
    font-family: var(--display);
    font-size: 26px;
    font-weight: 600;
    margin:0;
  }
  .section-head .hint{
    font-family: var(--mono);
    font-size: 11px;
    color: var(--chalk-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  /* ---------- LEADERBOARD ---------- */
  .leaderboard{
    margin-bottom: 64px;
  }
  .board-list{
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .board-row{
    display:grid;
    grid-template-columns: 36px 1fr auto;
    align-items:center;
    gap: 18px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 14px 18px;
    position:relative;
    overflow:hidden;
  }
  .board-row.rank-1{
    border-color: rgba(224,176,74,0.55);
    box-shadow: 0 0 0 1px rgba(224,176,74,0.18), 0 12px 28px -16px rgba(224,176,74,0.35);
  }
  .rank-num{
    font-family: var(--mono);
    font-size: 14px;
    color: var(--chalk-dim);
    text-align:center;
  }
  .rank-1 .rank-num{ color: var(--gold-bright); font-weight:700; }
  .player-name{
    font-family: var(--display);
    font-size: 18px;
    font-weight: 600;
  }
  .score-num{
    font-family: var(--mono);
    font-size: 15px;
    color: var(--gold-bright);
    white-space:nowrap;
  }
  .score-num .of{
    color: var(--chalk-dim);
    font-size: 12px;
  }
  .leaderboard-note{
    margin-top:18px;
    font-size: 13px;
    color: var(--chalk-dim);
    border-left: 2px solid var(--gold);
    padding-left: 14px;
  }

  /* ---------- PICKS TABLE ---------- */
  .table-scroll{
    overflow-x:auto;
    border: 1px solid var(--line);
    border-radius: 12px;
    background: var(--card);
  }
  table{
    border-collapse: collapse;
    width:100%;
    min-width: 920px;
  }
  thead th{
    font-family: var(--mono);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--pitch-dark);
    background: var(--gold-bright);
    padding: 14px 16px;
    text-align:left;
    position: sticky;
    top:0;
  }
  thead th:first-child{
    border-radius: 12px 0 0 0;
  }
  thead th:last-child{
    border-radius: 0 12px 0 0;
  }
  tbody td{
    padding: 11px 16px;
    border-bottom: 1px solid var(--line);
    font-size: 14px;
    white-space: nowrap;
  }
  tbody tr:last-child td{
    border-bottom:none;
  }
  tbody tr:nth-child(odd){
    background: rgba(244,241,230,0.02);
  }
  td.row-idx{
    font-family: var(--mono);
    color: var(--chalk-dim);
    font-size: 12px;
  }
  td.highlight {
    color: lightskyblue;
  }
  tbody tr:hover{
    background: rgba(224,176,74,0.07);
  }

  @media (max-width: 640px){
    .wrap{ padding: 40px 16px 80px; }
    .board-row{
      grid-template-columns: 28px 1fr auto;
      grid-template-rows: auto auto;
    }
  }

  @media (prefers-reduced-motion: reduce){
    .status-dot{ animation:none; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <h1>Ballghazi 2026 Draft Challenge<br><span>World Cup Round of 16</span></h1>
    <div class="status-pill">
      <span class="status-dot"></span>
      Round of 32 in progress &mdash; Round of 16 field not yet final
    </div>
  </header>

  <section class="leaderboard">
    <div class="section-head">
      <h2>Current Leaderboard</h2>
      <span class="hint" id="board-hint"># correct</span>
    </div>
    <div class="board-list" id="board-list"></div>
    <p class="leaderboard-note" id="board-note"></p>
  </section>

  <section class="picks">
    <div class="section-head">
      <h2>Everyone&rsquo;s Picks</h2>
    </div>
    <div class="table-scroll">
      <table id="picks-table">
        <thead><tr id="picks-head"></tr></thead>
        <tbody id="picks-body"></tbody>
      </table>
    </div>
  </section>
</div>

<script>
const picks = {"Neel": ["Argentina", "Belgium", "Brazil", "Colombia", "England", "France", "Germany", "Italy", "Japan", "Mexico", "Morocco", "Netherlands", "Norway", "Portugal", "Spain", "Switzerland"], "Luke": ["Belgium", "Brazil", "Colombia", "Croatia", "Denmark", "England", "France", "Germany", "Japan", "Mexico", "Morocco", "Netherlands", "Portugal", "Spain", "Uruguay", "USA"], "Joe": ["Argentina", "Belgium", "Brazil", "Egypt", "England", "France", "Germany", "Japan", "Mexico", "Morocco", "Netherlands", "Norway", "Portugal", "Spain", "Uruguay", "USA"], "Rick": ["Argentina", "Belgium", "Canada", "Colombia", "Côte d'Ivoire", "England", "France", "Germany", "Ghana", "Japan", "Mexico", "Netherlands", "South Korea", "Spain", "Uruguay", "USA"], "Cynthia": ["Argentina", "Belgium", "Brazil", "Colombia", "England", "France", "Germany", "Japan", "Mexico", "Morocco", "Netherlands", "Norway", "Portugal", "Spain", "Switzerland", "USA"], "Connie": ["Argentina", "Brazil", "Canada", "Colombia", "England", "France", "Germany", "Japan", "Mexico", "Morocco", "Netherlands", "Norway", "Portugal", "Spain", "Switzerland", "USA"], "Devin": ["Argentina", "Belgium", "Brazil", "Canada", "Croatia", "England", "France", "Germany", "Mexico", "Morocco", "Netherlands", "Portugal", "Senegal", "Spain", "USA", "Uruguay"], "Stephen": ["Argentina", "Belgium", "Colombia", "Egypt", "England", "France", "Germany", "Iran", "Côte d'Ivoire", "Japan", "Mexico", "Morocco", "Portugal", "South Korea", "Spain", "USA"], "Roz": ["Argentina", "Australia", "Brazil", "Colombia", "Czechia", "England", "France", "Germany", "Ghana", "Japan", "Mexico", "Netherlands", "Norway", "South Korea", "Spain", "USA"], "Kaley": ["Argentina", "Brazil", "Canada", "Colombia", "England", "France", "Germany", "Iran", "Japan", "Mexico", "Morocco", "Portugal", "Senegal", "Spain", "Uruguay", "USA"]};

const notInWC = ["Italy", "Denmark"]
const actualRound16 = ["Canada", "Morocco", "Paraguay", "Brazil", "Norway"]
const officialSet = new Set(actualRound16);

const people = Object.keys(picks);

const maxScore = 16;
let scores

if (actualRound16 && actualRound16.length) {
  scores = {};
  people.forEach(p => {
    scores[p] = picks[p].filter(t => officialSet.has(t)).length;
  });
}

// ----- Render leaderboard -----
const boardList = document.getElementById('board-list');
const sortedPeople = [...people].sort((a,b) => scores[b]-scores[a]);

sortedPeople.forEach((person, i) => {
  const row = document.createElement('div');
  row.className = 'board-row' + (i === 0 ? ' rank-1' : '');
  row.innerHTML = `
    <div class="rank-num">${i+1}</div>
    <div class="player-name">${person}</div>
    <div class="score-num">${scores[person]} <span class="of">/ ${maxScore}</span></div>
  `;
  boardList.appendChild(row);
});


// ----- Render picks table -----
const head = document.getElementById('picks-head');
head.innerHTML = '<th>#</th>' + people.map(p => `<th>${p}</th>`).join('');

const body = document.getElementById('picks-body');
for (let row = 0; row < 16; row++) {
  const tr = document.createElement('tr');
  let cells = `<td class="row-idx">${row+1}</td>`;
  people.forEach(person => {
    const team = picks[person][row];
    if (officialSet.has(team)) {
      cells += `<td class="highlight">${team}</td>`;
    } else {
    cells += `<td>${team}</td>`;
    }
  });
  tr.innerHTML = cells;
  body.appendChild(tr);
}
</script>
</body>
</html>
